<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vCards Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>vCards Table</h1>
    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Name</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for vcard in vcards %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ vcard.name }}</td>
                <td>{{ vcard.email }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
