{% extends 'base.html' %} {% block title %}Danh bạ{% endblock %} {% block
content %}

<div class="header">
  <h1>Danh bạ</h1>
  <a href="{{ url_for('export') }}"><button>Xuất file</button></a>
</div>

<table>
  <thead>
    <tr>
      <th>STT</th>
      <!-- <th><input type="checkbox" id="selectAll" /></th> -->
      <th>Số điện thoại</th>
      <th>Tên</th>
      <th>Chỉnh sửa</th>
    </tr>
  </thead>

  <tbody>
    {% for vcard in vcards %}
    <tr>
      <td>{{ loop.index }}</td>
      <!-- <td><input type="checkbox" class="selectRow" /></td> -->
      <td>{{ vcard.phone }}</td>
      <td>{{ vcard.name }}</td>
      <td class="actions">
        <button
          class="edit-button"
          onclick="editPhoneNumber('{{ vcard.phone }}','{{ vcard.name }}','database')"
        >
          Sửa
        </button>
        <button
          class="delete-button"
          onclick="deletePhoneNumber('{{ vcard.phone }}','{{ vcard.name }}','database')"
        >
          Xóa
        </button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
