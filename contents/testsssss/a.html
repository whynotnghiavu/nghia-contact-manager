<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Row Selection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <table id="myTable">
        <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>Item</th>
                <th>Price</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="checkbox" class="selectRow"></td>
                <td>Apple</td>
                <td>$1.00</td>
                <td>Fresh and juicy</td>
            </tr>
            <tr>
                <td><input type="checkbox" class="selectRow"></td>
                <td>Orange</td>
                <td>$0.80</td>
                <td>Citrus fruit</td>
            </tr>
            <tr>
                <td><input type="checkbox" class="selectRow"></td>
                <td>Banana</td>
                <td>$1.20</td>
                <td>Sweet and ripe</td>
            </tr>
        </tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
